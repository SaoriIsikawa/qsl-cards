    font-size: 13px;

    padding: 4px;

    width: 60px;

<body>

<div id="root"></div>

<!-- React + ReactDOM (UMD builds) and in-browser JSX compiler.
     This is the closest a "single .html file" can get to Next.js/React:
     Next.js itself requires a Node.js build/server and cannot run as one static file. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="text/babel">
const { useState, useRef } = React;

// ---- minimal CRC32 implementation (needed to embed a PNG pHYs/DPI chunk) ----
let crcTable = null;
function makeCrcTable() {
  const table = [];
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) {
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    table[n] = c >>> 0;
  }
  return table;
}
function crc32(bytes) {
  if (!crcTable) { crcTable = makeCrcTable(); }
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    c = crcTable[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  }
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function dataURLToUint8Array(dataURL) {
  const base64 = dataURL.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}

function writeUint32BE(value) {
  return [
    (value >>> 24) & 0xFF,
    (value >>> 16) & 0xFF,
    (value >>> 8) & 0xFF,
    value & 0xFF
  ];
}

// Inserts a pHYs chunk right after the IHDR chunk to mark the PNG as 300 dpi.
function addDpiToPng(pngBytes, dpi) {
  const pixelsPerMeter = Math.round(dpi * 39.3701); // 1 inch = 0.0254 m
  const typeBytes = [0x70, 0x48, 0x59, 0x73]; // "pHYs"
  const dataBytes = writeUint32BE(pixelsPerMeter)
    .concat(writeUint32BE(pixelsPerMeter))
    .concat([1]); // unit specifier: 1 = meters
  const chunkBody = typeBytes.concat(dataBytes);
  const crc = crc32(new Uint8Array(chunkBody));
  const lengthBytes = writeUint32BE(dataBytes.length);
  const crcBytes = writeUint32BE(crc);
  const newChunk = lengthBytes.concat(chunkBody).concat(crcBytes);

  // PNG signature (8 bytes) + IHDR chunk (4 length + 4 type + 13 data + 4 crc = 25 bytes) = 33
  const insertPos = 33;
  const result = new Uint8Array(pngBytes.length + newChunk.length);
  result.set(pngBytes.subarray(0, insertPos), 0);
  result.set(new Uint8Array(newChunk), insertPos);
  result.set(pngBytes.subarray(insertPos), insertPos + newChunk.length);
  return result;
}

function downloadBytesAsFile(bytes, filename, mimeType) {
  const blob = new Blob([bytes], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = filename;
  link.href = url;
  link.click();
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

function CheckBox(props) {
  return (
    <div className="checkitem">
      <span
        className={"checkbox" + (props.checked ? " checked" : "")}
        onClick={props.onToggle}
      ></span>
      <span className="label">{props.label}</span>
    </div>
  );
}

function App() {
  const [to, setTo] = useState("");
  const [day, setDay] = useState("");
  const [month, setMonth] = useState("");
  const [year, setYear] = useState("");
  const [utc, setUtc] = useState("");
  const [mhz, setMhz] = useState("");
  const [mode, setMode] = useState("");
  const [rst, setRst] = useState("");
  const [remarks, setRemarks] = useState("");
  const [checks, setChecks] = useState({ pse: false, tnx: false, twoway: false, swl: false });

  const cardRef = useRef(null);

  function toggleCheck(name) {
    setChecks(function (prev) {
      const next = Object.assign({}, prev);
      next[name] = !prev[name];
      return next;
    });
  }

  function renderCard(callback) {
    html2canvas(cardRef.current, {
      width: 825,
      height: 525,
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff'
    }).then(callback).catch(function (err) {
      console.error('html2canvas export failed:', err);
      alert('导出失败 Export failed:\n' + err.message);
    });
  }

  function downloadPNG() {
    renderCard(function (canvas) {
      const dataURL = canvas.toDataURL('image/png');
      const pngBytes = dataURLToUint8Array(dataURL);
      const pngWithDpi = addDpiToPng(pngBytes, 300);
      downloadBytesAsFile(pngWithDpi, 'BG7XTQ_QSL_card.png', 'image/png');
    });
  }

  function downloadPDF() {
    renderCard(function (canvas) {
      const imgData = canvas.toDataURL('image/png');
      // Standard QSL card: 5.5 in x 3.5 in physical page size.
      // The embedded 1650 x 1050 px image over a 5.5in x 3.5in page
      // is exactly 300 dpi (1650 / 5.5 = 300, 1050 / 3.5 = 300).
      const jsPDFCtor = window.jspdf.jsPDF;
      const pdf = new jsPDFCtor({
        orientation: 'landscape',
        unit: 'in',
        format: [5.5, 3.5]
      });
      pdf.addImage(imgData, 'PNG', 0, 0, 5.5, 3.5);
      pdf.save('BG7XTQ_QSL_card.pdf');
    });
  }

  return (
    <div className="wrap">
      <h1>业余无线电 QSL 卡片自助生成器（发卡自 BG7XTQ）</h1>
      <p className="sub">Amateur Radio QSL Card Generator &mdash; Issuer: BG7XTQ</p>

      <div className="panel">
        <h2>1. QSO 信息 QSO Information</h2>
        <div className="row">
          <label>TO RADIO</label>
          <input type="text" value={to} onChange={function (e) { setTo(e.target.value); }} placeholder="e.g. JA1XYZ" />
        </div>
        <div className="row">
          <label>DATE</label>
          <input type="text" className="small" value={day} onChange={function (e) { setDay(e.target.value); }} placeholder="DD" />
          <input type="text" className="small" value={month} onChange={function (e) { setMonth(e.target.value); }} placeholder="MM" />
          <input type="text" className="small" value={year} onChange={function (e) { setYear(e.target.value); }} placeholder="YYYY" />
        </div>
        <div className="row">
          <label>UTC</label>
          <input type="text" value={utc} onChange={function (e) { setUtc(e.target.value); }} placeholder="e.g. 0432" />
        </div>
        <div className="row">
          <label>MHz</label>
          <input type="text" value={mhz} onChange={function (e) { setMhz(e.target.value); }} placeholder="e.g. 14.074" />
        </div>
        <div className="row">
          <label>MODE</label>
          <input type="text" value={mode} onChange={function (e) { setMode(e.target.value); }} placeholder="e.g. FT8 / SSB / CW" />
        </div>
        <div className="row">
          <label>RST</label>
          <input type="text" value={rst} onChange={function (e) { setRst(e.target.value); }} placeholder="e.g. 599" />
        </div>
        <div className="row">
          <label>REMARKS</label>
          <input type="text" value={remarks} onChange={function (e) { setRemarks(e.target.value); }} placeholder="optional remarks / RIG / ANT" />
        </div>
      </div>

      <div className="panel">
        <h2>2. 预览 Preview（勾选框可直接在卡片上点击，也可直接截图，或使用下方按钮导出）</h2>
        <div id="cardOuter">
          <div id="card" ref={cardRef}>
            <div className="topline">
              <span className="side">CQ 24</span>
              <span className="center">PEOPLE'S REPUBLIC OF CHINA</span>
              <span className="side">ITU 43</span>
            </div>
            <div className="callsign">BG7XTQ</div>

            <div className="checkcluster left">
              <CheckBox label="PSE QSL" checked={checks.pse} onToggle={function () { toggleCheck('pse'); }} />
              <CheckBox label="TNX QSL" checked={checks.tnx} onToggle={function () { toggleCheck('tnx'); }} />
            </div>
            <div className="checkcluster right">
              <CheckBox label="CONFIRMING 2-WAY QSL" checked={checks.twoway} onToggle={function () { toggleCheck('twoway'); }} />
              <CheckBox label="SWL REPORT" checked={checks.swl} onToggle={function () { toggleCheck('swl'); }} />
            </div>

            <table className="qsotable">
              <tbody>
                <tr>
                  <th className="col-to">TO RADIO</th>
                  <th className="col-dmy" colSpan="3">DATE</th>
                  <th className="col-other">UTC</th>
                  <th className="col-other">MHz</th>
                  <th className="col-other">MODE</th>
                  <th className="col-other">RST</th>
                </tr>
                <tr>
                  <td><input type="text" value={to} onChange={function (e) { setTo(e.target.value); }} /></td>
                  <td><input type="text" className="datepart" value={day} onChange={function (e) { setDay(e.target.value); }} placeholder="D" /></td>
                  <td><input type="text" className="datepart" value={month} onChange={function (e) { setMonth(e.target.value); }} placeholder="M" /></td>
                  <td><input type="text" className="datepart" value={year} onChange={function (e) { setYear(e.target.value); }} placeholder="Y" /></td>
                  <td><input type="text" value={utc} onChange={function (e) { setUtc(e.target.value); }} /></td>
                  <td><input type="text" value={mhz} onChange={function (e) { setMhz(e.target.value); }} /></td>
                  <td><input type="text" value={mode} onChange={function (e) { setMode(e.target.value); }} /></td>
                  <td><input type="text" value={rst} onChange={function (e) { setRst(e.target.value); }} /></td>
                </tr>
              </tbody>
            </table>

            <div className="remarksbox">
              <input type="text" value={remarks} onChange={function (e) { setRemarks(e.target.value); }} placeholder="REMARKS" />
            </div>

            <div className="footer73">73</div>
          </div>
        </div>
      </div>

      <div className="panel">
        <h2>3. 导出 Export</h2>
        <button type="button" onClick={downloadPNG}>下载为图片 Download PNG</button>
        <button type="button" onClick={downloadPDF}>下载为 PDF Download PDF</button>
        <p id="hint">提示：如果导出按钮在您的浏览器中不可用，也可以直接对上方预览区域进行截图保存。</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
